<body>

<!-- NAV ESCRITORIO -->

</nav>
</div>
<!-- BUSCADOR MOBILE -->
<div class="container d-md-none mt-2">
<form role="search">
<div class="input-group buscador-hospital">
<span class="input-group-text bg-white border-end-0">
<i class="fa-solid fa-magnifying-glass"></i>
</span>
<input class="form-control border-start-0" placeholder="Buscar especialidad..." type="search"/>
</div>
</form>
</div>
<!-- MENÚ MOBILE -->
<div class="bg-primary p-3 d-none mt-2" id="menu-mobile">
<a class="text-white nav-link my-2" href="index.html">
<i class="fa-solid fa-house me-1"></i>Inicio
        </a>
<a class="text-white nav-link my-2" href="paginas/especialidades/especialidades.html">
<i class="fa-solid fa-list-ul me-1"></i>Especialidades
        </a>

        </a>
</div>
<!-- USUARIO -->
<div class="container mt-2">
<div class="d-inline-block" id="header-usuario">
<span aria-live="polite" class="d-none" id="usuario-logueado"></span>
<button class="btn btn-link text-white d-none" id="btn-logout">
            Salir
          </button>
</div>
</div>
</header>
<main class="py-5">
<div class="container">
<div class="row justify-content-center">
<div class="col-12 col-md-8 col-lg-5">
<div class="card rounded-4 shadow-sm p-4">
<h2 class="mb-3">Iniciar sesión</h2>
<p class="text-muted mb-4">
                Ingrese su correo electrónico y contraseña para acceder a su
                cuenta.
              </p>
<form id="form-login" method="post">
<div class="mb-3">
<label class="form-label" for="usuario">
                    usuario
                  </label>
<br/>
<input id="usuario" placeholder="Usuario" type="text"/>
</div>
<div class="mb-3">
<label class="form-label" for="email">Correo electrónico *</label>
<input autocomplete="email" class="form-control" id="email" name="email" placeholder="Dirección de correo electrónico" required="" type="email">
</input></div>
<div class="mb-3">
<label class="form-label" for="password">Contraseña *</label>
<input autocomplete="current-password" class="form-control" id="password" name="password" placeholder="Contraseña" required="" type="password"/>
</div>
<div aria-live="polite" class="alert alert-danger d-none" id="login-mensaje" role="status"></div>
<button class="btn btn-primary w-100" type="submit">
  Ingresar
</button>
</form>

</div>
</div>
</div>
</div>
</main>
<footer class="bg-dark text-white py-4">
<div class="container text-center">
<p class="mb-0">Hospital Zonal Caleta Olivia © 2026</p>
</div>
</footer>
</body>
<script>

const form = document.getElementById("form-login");

form.addEventListener("submit", function(event){

    // Evita recargar
    event.preventDefault();

    // Obtener valores
    let usuario = document.getElementById("usuario").value.trim();

    let password = document.getElementById("password").value.trim();

    // Validación
    if(usuario === "" || password === ""){

        alert("Complete todos los campos");

        return;
    }

    // Guardar usuario
    localStorage.setItem("usuarioLogueado", usuario);

    // Redirigir
    window.location.href = "index.html";

});

</script>
</html>
