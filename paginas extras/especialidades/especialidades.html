  <!-- Estilos de interacción (igual que index.html) -->
  <style>
    .nav-link,
    .btn-link,
    .btn-primary,
    .btn-outline-primary {
      transition: all 0.2s ease;
      transform: scale(1);
    }

    .nav-link:hover,
    .btn-link:hover,
    .btn-primary:hover,
    .btn-outline-primary:hover {
      transform: scale(1.05);
      color: #f5f5f5 !important;
      background-color: #0056b3 !important;
    }

    .nav-link:active,
    .btn-link:active,
    .btn-primary:active,
    .btn-outline-primary:active {
      transform: scale(0.98);
      background-color: #003d7a !important;
    }

    #btn-menu {
      transition: all 0.2s ease;
    }

    #btn-menu:hover {
      transform: scale(1.1);
      color: #fff;
    }

    #btn-menu:active {
      transform: scale(0.98);
    }

    .card a.text-primary {
      transition: all 0.2s ease;
    }

    .card a.text-primary:hover {
      color: #0056b3;
      text-decoration: underline;
      transform: scale(1.05);
      display: inline-block;
    }

    .card a.text-primary:active {
      transform: scale(0.98);
    }

    .form-control:hover,
    .input-group-text:hover {
      box-shadow: 0 0 0 0.2rem rgba(0, 86, 179, 0.25);
      border-color: #0056b3;
    }

    /* CSS básico para expansión de secciones al hover (puede ser reemplazado) */
    .seccion-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .seccion-hover:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15) !important;
    }
  </style>
</head>
